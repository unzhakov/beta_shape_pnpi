[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "beta-spectrum"
version = "0.1.0"
description = "High-precision beta spectrum calculation for nuclear physics"
authors = [
    { name = "Your Name" }
]
requires-python = ">=3.10"

dependencies = [
    "numpy",
    "scipy",
    "matplotlib"
]

[tool.setuptools.packages.find]
where = ["."]

[project.optional-dependencies]
dev = [
    "pytest",
    "black",
    "ruff",
    "mypy"
]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
